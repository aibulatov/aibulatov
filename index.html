<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>aibulatov.ai | Персональный Ассистент</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F8F7F4;
      --surface: #FFFFFF;
      --accent: #6332E3;
      --accent-soft: #F0E6FF;
      --text: #1A1A1A;
      --text-dim: #666666;
      --border: rgba(0, 0, 0, 0.08);
      --danger: #FF4D4D;
      --danger-soft: #FFF0F0;
      --court: #4A90E2;
      --task: #9B51E0;
      --consult: #2EBD85;
      --shadow: 0 6px 18px rgba(0,0,0,0.05);
      --shadow-soft: 0 3px 10px rgba(0,0,0,0.04);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Lexend', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    textarea, input, select, button {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--bg);
    }

    .main {
      flex: 1;
      padding: 0 20px 40px;
      overflow-y: auto;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .header {
      padding: 38px 0 24px;
      text-align: center;
    }

    .logo-text {
      font-family: 'Lexend', sans-serif;
      font-weight: 500;
      font-size: 32px;
      color: var(--accent);
      letter-spacing: -1px;
      margin: 0;
    }

    .header p {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-top: 5px;
      font-weight: 500;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }

    .action-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 25px 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 148px;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .recording {
      background: var(--danger-soft);
      border-color: var(--danger);
      animation: breathe 1.5s infinite;
    }

    @keyframes breathe {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .timer {
      font-family: monospace;
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      min-height: 15px;
    }

    .conflict-banner {
      background: var(--danger-soft);
      border: 1px solid var(--danger);
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 20px;
      color: #D32F2F;
      font-size: 13px;
      line-height: 1.5;
    }

    .daily-brief {
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
      display: none;
      box-shadow: var(--shadow-soft);
    }

    .brief-title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 10px;
      color: var(--accent);
    }

    .brief-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }

    .dashboard {
      margin-top: 10px;
    }

    .dash-title {
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .ev-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      border-left: 5px solid var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
      box-shadow: var(--shadow-soft);
    }

    .ev-item.court { border-left-color: var(--court); }
    .ev-item.task { border-left-color: var(--task); }
    .ev-item.consult { border-left-color: var(--consult); }

    .ev-main {
      min-width: 0;
      flex: 1;
    }

    .ev-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      word-break: break-word;
      line-height: 1.45;
    }

    .ev-time {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: flex-end;
      z-index: 1000;
    }

    .modal-content {
      background: var(--bg);
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      border-radius: 30px 30px 0 0;
      padding: 30px 20px calc(30px + env(safe-area-inset-bottom));
      box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
    }

    .modal-content h2 {
      font-weight: 600;
      margin-bottom: 20px;
    }

    .field,
    .ai-card input,
    #voiceText,
    #aiInp {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      background: var(--surface);
      color: var(--text);
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .field,
    .ai-card input,
    #voiceText {
      margin-bottom: 15px;
    }

    .field:focus,
    .ai-card input:focus,
    #voiceText:focus,
    #aiInp:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 50, 227, 0.08);
    }

    .ai-card {
      background: var(--accent-soft);
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 20px;
      border: 1px dashed var(--accent);
    }

    .ai-help {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
      margin-top: -4px;
    }

    .ai-msgs {
      height: 380px;
      overflow-y: auto;
      background: var(--surface);
      padding: 15px;
      border-radius: 20px;
      border: 1px solid var(--border);
      margin-bottom: 15px;
      box-shadow: var(--shadow);
    }

    .msg {
      display: flex;
      margin-bottom: 12px;
    }

    .msg.user {
      justify-content: flex-end;
    }

    .msg.ai {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 92%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 14px;
      white-space: pre-wrap;
      line-height: 1.7;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .msg.ai .bubble {
      background: #F0F2F5;
      color: var(--text);
      border-bottom-left-radius: 8px;
    }

    .nav {
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 12px 0 calc(12px + env(safe-area-inset-bottom));
      z-index: 50;
    }

    .nav-item {
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #999;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item span:first-child {
      font-size: 22px;
    }

    .btn {
      background: var(--text);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      width: 100%;
      margin-top: 10px;
      transition: 0.2s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: default;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .mini-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 6px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .mini-btn:active {
      transform: scale(0.95);
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 20px;
      font-size: 12px;
      background: rgba(255,255,255,0.55);
      border: 1px dashed var(--border);
      border-radius: 16px;
    }

    .cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 10px;
    }

    .cal-nav-btn {
      border: none;
      background: var(--surface);
      width: 38px;
      height: 38px;
      border-radius: 12px;
      font-size: 18px;
      box-shadow: var(--shadow-soft);
      cursor: pointer;
    }

    .cal-nav-btn:active {
      transform: scale(0.97);
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 10px;
      margin-bottom: 10px;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .cd {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 13px;
      cursor: pointer;
      position: relative;
      box-shadow: var(--shadow-soft);
      user-select: none;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }

    .cd:active {
      transform: scale(0.97);
    }

    .cd.other {
      opacity: 0.35;
    }

    .cd.today {
      border-color: var(--accent);
      font-weight: 600;
    }

    .cd.sel {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .cd.has::after,
    .cd.hcourt::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
    }

    .cd.has::after {
      background: var(--task);
    }

    .cd.hcourt::after {
      background: var(--court);
    }

    .muted {
      color: var(--text-dim);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="main">
      <div id="p-home" class="section active">
        <div class="header">
          <h1 class="logo-text">aibulatov.ai</h1>
          <p>Elite Legal Assistant | 19 Years Exp</p>
        </div>

        <div id="dailyBriefBox" class="daily-brief">
          <div class="brief-title">Брифинг Байтелеу Сериковича</div>
          <div id="briefContent" class="brief-text">Подготовка аналитики...</div>
          <button class="btn btn-secondary" onclick="closeBrief()">Ознакомлен</button>
        </div>

        <div class="actions">
          <div class="action-btn" id="micBtn" onclick="toggleMic()">
            <div style="font-size:38px; margin-bottom:10px;" id="micIco">🎤</div>
            <div style="font-weight:600; font-size:13px; color:var(--text-dim);" id="micLabel">Диктовка</div>
            <div class="timer" id="timer"></div>
          </div>

          <div class="action-btn" onclick="openModal()">
            <div style="font-size:38px; margin-bottom:10px;">✍️</div>
            <div style="font-weight:600; font-size:13px; color:var(--text-dim);">Текст</div>
          </div>
        </div>

        <div id="voiceResult" style="display:none; margin-bottom:25px;">
          <label for="voiceText" class="sr-only">Результат диктовки</label>
          <textarea id="voiceText" rows="6" placeholder="Здесь появится текст диктовки..."></textarea>
          <button class="btn" style="background: var(--accent)" onclick="copyVoice()">Скопировать в буфер</button>
        </div>

        <div id="homeConflicts"></div>

        <div class="dashboard">
          <div class="dash-title">Ближайшие дела</div>
          <div id="homeUpcomingList"></div>
        </div>
      </div>

      <div id="p-cal" class="section">
        <div class="header">
          <h1 class="logo-text">calendar</h1>
        </div>

        <div id="calConflicts"></div>

        <div class="cal-header">
          <button class="cal-nav-btn" onclick="moveMonth(-1)" aria-label="Предыдущий месяц">←</button>
          <div id="calMonthYear" style="font-weight:600;"></div>
          <button class="cal-nav-btn" onclick="moveMonth(1)" aria-label="Следующий месяц">→</button>
        </div>

        <div class="cal-weekdays">
          <span>ПН</span><span>ВТ</span><span>СР</span><span>ЧТ</span><span>ПТ</span><span>СБ</span><span>ВС</span>
        </div>

        <div class="cal-grid" id="calGrid"></div>

        <button class="btn" style="background:var(--accent); margin-top:25px;" onclick="openModal()">+ Новая запись</button>
        <div id="dayEvents" style="margin-top:25px;"></div>
      </div>

      <div id="p-ai" class="section">
        <div class="header">
          <h1 class="logo-text">assistant</h1>
        </div>

        <div class="ai-card">
          <input
            type="password"
            id="apiKey"
            placeholder="Введите Google Gemini API Key"
            onchange="saveKey()"
            autocomplete="off"
            spellcheck="false"
          />
          <div class="ai-help">
            Временная клиентская интеграция. Для продакшена API-ключ лучше хранить только на сервере.
          </div>
        </div>

        <div class="ai-msgs" id="aiMsgs"></div>

        <textarea
          id="aiInp"
          rows="3"
          placeholder="Опишите задачу или фабулу..."
        ></textarea>

        <button class="btn" id="aiSendBtn" style="background:var(--accent);" onclick="sendAiMsg()">
          Получить аналитику
        </button>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-item active" onclick="switchNav('home', this)">
        <span>🏠</span><span>Главная</span>
      </button>
      <button class="nav-item" onclick="switchNav('cal', this)">
        <span>📅</span><span>График</span>
      </button>
      <button class="nav-item" onclick="switchNav('ai', this)">
        <span>⚖️</span><span>ИИ</span>
      </button>
    </nav>

    <div class="modal-overlay" id="addModal" onclick="closeModalOnOverlay(event)">
      <div class="modal-content">
        <h2>Новое поручение</h2>
        <select id="evType" class="field">
          <option value="court">Судебный процесс</option>
          <option value="consult">Консультация</option>
          <option value="task">Задача</option>
        </select>
        <input type="text" id="evTitle" class="field" placeholder="Суть дела / Имя клиента" maxlength="180" />
        <input type="date" id="evDate" class="field" />
        <input type="time" id="evTime" class="field" />
        <button class="btn" style="background:var(--accent)" onclick="saveEvent()">Запланировать</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_EVENTS_KEY = 'lexEvents';
    const STORAGE_GEMINI_KEY = 'gemini_key';
    const STORAGE_LAST_BRIEF_KEY = 'lastBriefDate';

    const monthNames = [
      'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
      'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
    ];

    let events = [];
    let micOn = false;
    let recognition = null;
    let timer = null;
    let startTime = null;
    let currDate = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    let selDateStr = null;
    let aiLoading = false;

    window.addEventListener('load', initApp);

    function initApp() {
      events = loadEvents();

      const apiKeyInput = document.getElementById('apiKey');
      apiKeyInput.value = localStorage.getItem(STORAGE_GEMINI_KEY) || '';

      document.getElementById('evDate').value = getLocalDateStr();

      const aiInput = document.getElementById('aiInp');
      aiInput.addEventListener('keydown', onAiKeydown);

      renderHome();
      renderCalendar();
      checkMorningBrief();
      setInterval(checkMorningBrief, 60000);
    }

    function onAiKeydown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendAiMsg();
      }
    }

    function loadEvents() {
      try {
        const raw = localStorage.getItem(STORAGE_EVENTS_KEY);
        if (!raw) return [];

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];

        return parsed
          .filter(item => item && typeof item === 'object')
          .map(item => ({
            id: Number(item.id) || Date.now() + Math.floor(Math.random() * 10000),
            type: normalizeEventType(item.type),
            title: typeof item.title === 'string' ? item.title.trim() : '',
            date: typeof item.date === 'string' ? item.date : '',
            time: normalizeTimeValue(item.time)
          }))
          .filter(item => item.title && item.date);
      } catch {
        return [];
      }
    }

    function saveEvents() {
      localStorage.setItem(STORAGE_EVENTS_KEY, JSON.stringify(events));
    }

    function normalizeEventType(type) {
      if (type === 'court' || type === 'consult' || type === 'task') return type;
      return 'task';
    }

    function getLocalDateStr(date = new Date()) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function normalizeTimeValue(value) {
      return typeof value === 'string' && /^\d{2}:\d{2}$/.test(value) ? value : '';
    }

    function timeToMins(t) {
      const value = normalizeTimeValue(t);
      if (!value) return null;
      const [hh, mm] = value.split(':').map(Number);
      return hh * 60 + mm;
    }

    function compareEventDateTime(a, b) {
      const left = `${a.date} ${normalizeTimeValue(a.time) || '99:99'}`;
      const right = `${b.date} ${normalizeTimeValue(b.time) || '99:99'}`;
      return left.localeCompare(right);
    }

    function createEmptyState(text, fontSize = '12px') {
      const div = document.createElement('div');
      div.className = 'empty-state';
      div.style.fontSize = fontSize;
      div.textContent = text;
      return div;
    }

    function createEventCard(event, withDelete = false) {
      const wrapper = document.createElement('div');
      wrapper.className = `ev-item ${event.type}`;

      const main = document.createElement('div');
      main.className = 'ev-main';

      const title = document.createElement('div');
      title.className = 'ev-title';
      title.textContent = event.title;

      const time = document.createElement('div');
      time.className = 'ev-time';

      if (withDelete) {
        time.textContent = normalizeTimeValue(event.time) || '--:--';
      } else {
        time.textContent = `${event.date} | ${normalizeTimeValue(event.time) || '--:--'}`;
      }

      main.appendChild(title);
      main.appendChild(time);
      wrapper.appendChild(main);

      if (withDelete) {
        const btn = document.createElement('button');
        btn.className = 'mini-btn';
        btn.setAttribute('aria-label', 'Удалить событие');
        btn.textContent = '×';
        btn.addEventListener('click', () => delEvent(event.id));
        wrapper.appendChild(btn);
      }

      return wrapper;
    }

    function renderHome() {
      const list = document.getElementById('homeUpcomingList');
      list.innerHTML = '';

      const nowStr = getLocalDateStr();

      const upcoming = [...events]
        .filter(event => event.date >= nowStr)
        .sort(compareEventDateTime)
        .slice(0, 5);

      renderConflicts('homeConflicts');

      if (upcoming.length === 0) {
        list.appendChild(createEmptyState('График на ближайшее время свободен.'));
        return;
      }

      upcoming.forEach(event => list.appendChild(createEventCard(event)));
    }

    function renderConflicts(containerId) {
      const box = document.getElementById(containerId);
      box.innerHTML = '';

      const nowStr = getLocalDateStr();

      const upcoming = [...events]
        .filter(event => event.date >= nowStr && normalizeTimeValue(event.time))
        .sort(compareEventDateTime);

      const seenPairs = new Set();

      for (let i = 0; i < upcoming.length; i++) {
        for (let j = i + 1; j < upcoming.length; j++) {
          if (upcoming[i].date !== upcoming[j].date) continue;

          const minsA = timeToMins(upcoming[i].time);
          const minsB = timeToMins(upcoming[j].time);
          if (minsA === null || minsB === null) continue;

          if (Math.abs(minsA - minsB) < 60) {
            const key = [upcoming[i].id, upcoming[j].id].sort().join(':');
            if (seenPairs.has(key)) continue;
            seenPairs.add(key);

            const banner = document.createElement('div');
            banner.className = 'conflict-banner';
            banner.innerHTML = `<strong>⚠️ Конфликт времени:</strong> «${escapeForHtml(upcoming[i].title)}» и «${escapeForHtml(upcoming[j].title)}» пересекаются. Рекомендуется проверить график и при необходимости подготовить заявление о переносе.`;
            box.appendChild(banner);
          }
        }
      }
    }

    function moveMonth(dir) {
      const year = currDate.getFullYear();
      const month = currDate.getMonth();
      currDate = new Date(year, month + dir, 1);
      renderCalendar();
    }

    function selectDay(dateStr) {
      selDateStr = selDateStr === dateStr ? null : dateStr;
      renderCalendar();
    }

    function renderCalendar() {
      renderConflicts('calConflicts');

      const year = currDate.getFullYear();
      const month = currDate.getMonth();

      document.getElementById('calMonthYear').textContent = `${monthNames[month]} ${year}`;

      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthDays = new Date(year, month, 0).getDate();
      const todayStr = getLocalDateStr();

      const start = firstDay === 0 ? 6 : firstDay - 1;

      for (let i = start - 1; i >= 0; i--) {
        const cell = document.createElement('div');
        cell.className = 'cd other';
        cell.textContent = String(prevMonthDays - i);
        grid.appendChild(cell);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = events.filter(event => event.date === dateStr);

        let cls = 'cd';
        if (dateStr === todayStr) cls += ' today';
        if (dateStr === selDateStr) cls += ' sel';
        if (dayEvents.length > 0) {
          cls += ' has';
          if (dayEvents.some(event => event.type === 'court')) cls += ' hcourt';
        }

        const cell = document.createElement('div');
        cell.className = cls;
        cell.textContent = String(day);
        cell.addEventListener('click', () => selectDay(dateStr));
        grid.appendChild(cell);
      }

      const totalCells = start + daysInMonth;
      const nextDays = (7 - (totalCells % 7)) % 7;

      for (let i = 1; i <= nextDays; i++) {
        const cell = document.createElement('div');
        cell.className = 'cd other';
        cell.textContent = String(i);
        grid.appendChild(cell);
      }

      renderDayEvents();
    }

    function renderDayEvents() {
      const box = document.getElementById('dayEvents');
      box.innerHTML = '';

      if (!selDateStr) return;

      const dayEvents = [...events]
        .filter(event => event.date === selDateStr)
        .sort(compareEventDateTime);

      if (dayEvents.length === 0) {
        box.appendChild(createEmptyState('Дела на эту дату не назначены.', '13px'));
        return;
      }

      dayEvents.forEach(event => box.appendChild(createEventCard(event, true)));
    }

    function openModal() {
      document.getElementById('addModal').style.display = 'flex';
      document.getElementById('evTitle').focus();
    }

    function closeModal() {
      document.getElementById('addModal').style.display = 'none';
    }

    function closeModalOnOverlay(event) {
      if (event.target.id === 'addModal') {
        closeModal();
      }
    }

    function clearEventForm() {
      document.getElementById('evType').value = 'court';
      document.getElementById('evTitle').value = '';
      document.getElementById('evDate').value = getLocalDateStr();
      document.getElementById('evTime').value = '';
    }

    function saveEvent() {
      const type = normalizeEventType(document.getElementById('evType').value);
      const title = document.getElementById('evTitle').value.trim();
      const date = document.getElementById('evDate').value;
      const time = normalizeTimeValue(document.getElementById('evTime').value);

      if (!title || !date) {
        alert('Введите название и дату');
        return;
      }

      const duplicate = events.some(event =>
        event.type === type &&
        event.title === title &&
        event.date === date &&
        (event.time || '') === (time || '')
      );

      if (duplicate) {
        alert('Такое событие уже есть в графике');
        return;
      }

      const conflict = events.find(event => {
        if (event.date !== date) return false;
        if (!normalizeTimeValue(event.time) || !time) return false;

        const a = timeToMins(event.time);
        const b = timeToMins(time);
        if (a === null || b === null) return false;

        return Math.abs(a - b) < 60;
      });

      if (conflict && !confirm(`Накладка с делом: «${conflict.title}». Сохранить?`)) {
        return;
      }

      events.push({
        id: Date.now(),
        type,
        title,
        date,
        time
      });

      events.sort(compareEventDateTime);
      saveEvents();
      closeModal();
      clearEventForm();
      renderHome();
      renderCalendar();
    }

    function delEvent(id) {
      events = events.filter(event => event.id !== id);
      saveEvents();
      renderHome();
      renderCalendar();
    }

    function closeBrief() {
      document.getElementById('dailyBriefBox').style.display = 'none';
    }

    function checkMorningBrief() {
      const now = new Date();
      const todayStr = getLocalDateStr(now);
      const lastBrief = localStorage.getItem(STORAGE_LAST_BRIEF_KEY);

      const isAfterNine = now.getHours() >= 9;
      if (isAfterNine && lastBrief !== todayStr) {
        showDailyBrief();
        localStorage.setItem(STORAGE_LAST_BRIEF_KEY, todayStr);
      }
    }

    async function showDailyBrief() {
      const box = document.getElementById('dailyBriefBox');
      const content = document.getElementById('briefContent');
      box.style.display = 'block';

      const today = new Date();
      const todayStr = getLocalDateStr(today);

      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const tomorrowStr = getLocalDateStr(tomorrow);

      const todayEvents = events.filter(event => event.date === todayStr).sort(compareEventDateTime);
      const tomorrowEvents = events.filter(event => event.date === tomorrowStr).sort(compareEventDateTime);

      const todayText = todayEvents.length
        ? todayEvents.map(event => `${event.title} в ${normalizeTimeValue(event.time) || '--:--'}`).join(', ')
        : 'спокойный день';

      const tomorrowText = tomorrowEvents.length
        ? tomorrowEvents.map(event => `${event.title} в ${normalizeTimeValue(event.time) || '--:--'}`).join(', ')
        : 'без выездов';

      const rawPlan = `График. Сегодня: ${todayText}. Завтра: ${tomorrowText}.`;

      const key = localStorage.getItem(STORAGE_GEMINI_KEY);
      if (!key) {
        content.textContent = rawPlan;
        return;
      }

      content.textContent = 'Подготовка аналитики...';

      try {
        const aiText = await askGemini(
          key,
          'Ты элитный цифровой секретарь Байтелеу Сериковича. Составь краткий утренний отчет. Пиши строго сплошным профессиональным текстом. Запрещено использовать списки.',
          'Подготовь текст по расписанию: ' + rawPlan
        );

        content.textContent = aiText || rawPlan;
      } catch {
        content.textContent = rawPlan;
      }
    }

    function saveKey() {
      const value = document.getElementById('apiKey').value.trim();
      if (value) {
        localStorage.setItem(STORAGE_GEMINI_KEY, value);
      } else {
        localStorage.removeItem(STORAGE_GEMINI_KEY);
      }
    }

    async function askGemini(key, systemText, userText) {
      // ИСПРАВЛЕНИЕ: Вызов самой современной и производительной версии API
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro:generateContent?key=${encodeURIComponent(key)}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          systemInstruction: {
            parts: [{ text: systemText }]
          },
          contents: [{
            parts: [{ text: userText }]
          }]
        })
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;

      if (!text) {
        throw new Error('Пустой ответ модели');
      }

      return text;
    }

    function addMsg(role, text) {
      const wrap = document.getElementById('aiMsgs');

      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      msg.appendChild(bubble);
      wrap.appendChild(msg);
      wrap.scrollTop = wrap.scrollHeight;
    }

    async function sendAiMsg() {
      if (aiLoading) return;

      const key = localStorage.getItem(STORAGE_GEMINI_KEY);
      const input = document.getElementById('aiInp');
      const btn = document.getElementById('aiSendBtn');
      const text = input.value.trim();

      if (!text || !key) {
        alert('Требуется ключ API и запрос');
        return;
      }

      aiLoading = true;
      btn.disabled = true;
      btn.textContent = 'Анализ...';

      addMsg('user', text);
      input.value = '';

      try {
        const aiText = await askGemini(
          key,
          'Ты элитный юридический помощник юриста с 19-летним опытом. Пиши строго сплошным профессиональным текстом без списков.',
          text
        );

        addMsg('ai', aiText);
      } catch {
        addMsg('ai', 'Сбой системы. Проверьте ключ API, соединение или лимиты модели.');
      } finally {
        aiLoading = false;
        btn.disabled = false;
        btn.textContent = 'Получить аналитику';
      }
    }

    function toggleMic() {
      const btn = document.getElementById('micBtn');
      const icon = document.getElementById('micIco');
      const label = document.getElementById('micLabel');
      const timeEl = document.getElementById('timer');

      if (!micOn) {
        const started = startMic();
        if (!started) return;

        btn.classList.add('recording');
        icon.textContent = '🛑';
        label.textContent = 'Завершить';
        micOn = true;
      } else {
        stopMic();
        btn.classList.remove('recording');
        icon.textContent = '🎤';
        label.textContent = 'Диктовка';
        timeEl.textContent = '';
        micOn = false;
      }
    }

    function resetMicUi() {
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micIco').textContent = '🎤';
      document.getElementById('micLabel').textContent = 'Диктовка';
      document.getElementById('timer').textContent = '';
      micOn = false;
    }

    function startMic() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SR) {
        alert('Голосовой ввод не поддерживается на этом устройстве');
        return false;
      }

      try {
        recognition = new SR();
      } catch {
        alert('Не удалось запустить голосовой ввод');
        return false;
      }

      recognition.lang = 'ru-RU';
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onresult = (event) => {
        let transcript = '';

        for (let i = 0; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }

        document.getElementById('voiceText').value = transcript;
        document.getElementById('voiceResult').style.display = 'block';
      };

      recognition.onerror = () => {
        stopMic();
        resetMicUi();
      };

      recognition.onend = () => {
        if (micOn) {
          stopMic();
          resetMicUi();
        }
      };

      recognition.start();

      startTime = Date.now();
      timer = setInterval(() => {
        const sec = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('timer').textContent =
          `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;
      }, 1000);

      return true;
    }

    function stopMic() {
      if (recognition) {
        try {
          recognition.stop();
        } catch {}
      }

      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    async function copyVoice() {
      const text = document.getElementById('voiceText').value.trim();

      if (!text) {
        alert('Нет текста для копирования');
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        alert('Текст сохранен');
      } catch {
        const area = document.getElementById('voiceText');
        area.focus();
        area.select();

        try {
          document.execCommand('copy');
          alert('Текст сохранен');
        } catch {
          alert('Не удалось скопировать текст');
        }
      }
    }

    function switchNav(id, btn) {
      document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));

      document.getElementById('p-' + id).classList.add('active');
      btn.classList.add('active');

      if (id === 'home') renderHome();
      if (id === 'cal') renderCalendar();
      if (id === 'ai') {
        const aiWrap = document.getElementById('aiMsgs');
        aiWrap.scrollTop = aiWrap.scrollHeight;
      }
    }

    function escapeForHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
